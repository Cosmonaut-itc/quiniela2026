<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Sin href estático a propósito: ManifestSync lo apunta a un blob con
         start_url = ruta actual. Un manifest estático con start_url "/" lo
         cachea iOS y abriría la PWA en crear-quiniela sin importar desde dónde
         se instale (en algunos iPhone se quedaba con ese, no con el blob). -->
    <link rel="manifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!-- iOS standalone: sin estos meta tags iOS no trata la app como PWA de
         forma robusta (la navegación se sale a Safari) y el contenido no
         respeta el notch / barra de estado. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Quiniela" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Sora:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <title>Quiniela Mundial 2026</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
